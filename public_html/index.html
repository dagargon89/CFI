<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Pizarrón Digital - CFI Logístico</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">CFI Logístico - Pizarrón Digital</h1>
            <nav>
                <button class="px-4 py-2 bg-blue-700 hover:bg-blue-600 rounded">Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <!-- App Container -->
    <main class="max-w-7xl mx-auto px-4 py-8" x-data="pizarronApp()">
        
        <!-- Tabs -->
        <div class="mb-6 border-b border-gray-200">
            <nav class="-mb-px flex space-x-8">
                <button @click="activeTab = 'tractocamiones'" :class="activeTab === 'tractocamiones' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'" class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm">
                    Tractocamiones
                </button>
                <button @click="activeTab = 'choferes'" :class="activeTab === 'choferes' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'" class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm">
                    Choferes
                </button>
                <button @click="activeTab = 'cajas'" :class="activeTab === 'cajas' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'" class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm">
                    Cajas/Remolques
                </button>
            </nav>
        </div>

        <!-- Feedback Messages -->
        <div x-show="error" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert" x-text="error" style="display: none;"></div>
        
        <!-- Tractocamiones View -->
        <div x-show="activeTab === 'tractocamiones'">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold">Tractocamiones Base</h2>
                <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Añadir Tracto</button>
            </div>
            
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Económico</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Placas</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado Operativo</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="item in data.tractocamiones" :key="item.id">
                            <tr>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="item.economico"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="item.placas"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" 
                                          :class="item.status_operativo === 'disponible' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'"
                                          x-text="item.status_operativo"></span>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="data.tractocamiones.length === 0">
                            <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">Cargando datos o sin registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Choferes View -->
        <div x-show="activeTab === 'choferes'" style="display: none;">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold">Choferes Activos</h2>
            </div>
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Licencia</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="chofer in data.choferes" :key="chofer.id">
                            <tr>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="chofer.nombre"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="chofer.numero_licencia"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="chofer.status"></td>
                            </tr>
                        </template>
                        <tr x-show="data.choferes.length === 0">
                            <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">Cargando datos o sin registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Cajas View -->
        <div x-show="activeTab === 'cajas'" style="display: none;">
            <!-- Similar table structure for Cajas -->
             <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold">Cajas y Remolques</h2>
            </div>
             <div class="bg-white shadow rounded-lg overflow-hidden">
                 <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Económico</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Subtipo</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="caja in data.cajas" :key="caja.id">
                            <tr>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="caja.economico"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="caja.subtipo"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="caja.status"></td>
                            </tr>
                        </template>
                        <tr x-show="data.cajas.length === 0">
                            <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">Cargando datos o sin registros...</td>
                        </tr>
                    </tbody>
                </table>
             </div>
        </div>

    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('pizarronApp', () => ({
                activeTab: 'tractocamiones',
                error: null,
                data: {
                    tractocamiones: [],
                    choferes: [],
                    cajas: []
                },
                
                init() {
                    this.fetchData();
                    // Watch tab changes to potentially reload that tab specifically
                    this.$watch('activeTab', (value) => {
                        this.fetchData(value);
                    });
                },

                async fetchData(tab = this.activeTab) {
                    this.error = null;
                    try {
                        let endpoint = '/api/' + tab;
                        const response = await fetch(endpoint, {
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        if (!response.ok) {
                            if(response.status === 401 || response.status === 403) {
                                this.error = "No autorizado. Inicie sesión (La UI de Login no está en este flujo base).";
                            } else {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                        } else {
                             const resData = await response.json();
                             this.data[tab] = resData;
                        }
                    } catch (e) {
                        this.error = "Error al conectar con la API: " + e.message;
                        console.error("Fetch error: ", e);
                    }
                }
            }));
        });
    </script>
</body>
</html>
