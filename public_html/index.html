<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Central - CFI Logístico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased overflow-hidden" x-data="pizarronApp()">

<div class="flex h-screen bg-gray-100" x-show="user" style="display: none;">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-gray-300 flex flex-col shadow-xl z-20">
        <div class="h-16 flex items-center px-6 bg-slate-950 text-white font-bold text-lg tracking-wider border-b border-gray-800">
            📊 CFI Logístico
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <!-- Nivel 1 - Solo visible para Tráfico/Admin/Mantenimiento -->
            <template x-if="!hasRole('cliente')">
                <div>
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-4 px-2">Nivel 1</div>
                    <button @click="setModule('activos', 'tractocamiones')" :class="activeModule === 'activos' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'" class="w-full text-left px-4 py-2 rounded-lg font-medium transition flex items-center">
                        🚛 Control de Activos
                    </button>
                </div>
            </template>
            
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-6 px-2">Nivel 2</div>
            <button @click="setModule('operaciones', 'viajes')" :class="activeModule === 'operaciones' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'" class="w-full text-left px-4 py-2 rounded-lg font-medium transition flex items-center">
                🗺️ Solicitudes y Viajes
            </button>
            <button @click="setModule('operaciones', 'evidencias')" :class="activeTab === 'evidencias' ? 'bg-slate-700 text-white' : 'hover:bg-slate-800 hover:text-white'" class="w-full text-left px-4 py-2 rounded-lg font-medium transition flex items-center pl-8">
                📎 Evidencias (XML/PDF)
            </button>

            <!-- Nivel 3 - Solo visible para Mantenimiento/Admin -->
            <template x-if="hasRole('admin') || hasRole('mantenimiento')">
                <div>
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-6 px-2">Nivel 3</div>
                    <button @click="setModule('mantenimiento', 'ordenes_trabajo')" :class="activeModule === 'mantenimiento' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'" class="w-full text-left px-4 py-2 rounded-lg font-medium transition flex items-center">
                        🛠️ Taller y Fallas
                    </button>
                    <button @click="setModule('mantenimiento', 'insumos')" :class="activeTab === 'insumos' ? 'bg-slate-700 text-white' : 'hover:bg-slate-800 hover:text-white'" class="w-full text-left px-4 py-2 rounded-lg font-medium transition flex items-center pl-8">
                        📦 Insumos / Refacciones
                    </button>
                </div>
            </template>

            <!-- Nivel 4 - Solo visible para Finanzas/Admin -->
            <template x-if="hasRole('admin') || hasRole('finanzas')">
                <div>
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-6 px-2">Nivel 4</div>
                    <button @click="setModule('finanzas', 'gastos_operativos')" :class="activeModule === 'finanzas' ? 'bg-emerald-600 text-white' : 'hover:bg-slate-800 hover:text-white'" class="w-full text-left px-4 py-2 rounded-lg font-medium transition flex items-center">
                        💸 Finanzas y Auditoría
                    </button>
                </div>
            </template>
        </nav>
        <div class="p-4 bg-slate-950">
            <div class="text-xs text-center text-gray-500 mb-2 truncate" x-text="user.email"></div>
            <a href="/logout" class="block w-full text-center bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md font-medium transition text-sm">Cerrar Sesión</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Topbar -->
        <header class="h-16 bg-white shadow-sm flex items-center px-8 z-10 justify-between">
            <h2 class="text-xl font-semibold text-gray-800 capitalize" x-text="activeModule.replace('_', ' ')"></h2>
            <div x-show="error" class="bg-red-100 text-red-700 px-4 py-1 rounded shadow-sm text-sm font-bold" x-text="error" style="display: none;"></div>
            <div class="flex items-center space-x-2">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest" x-text="user.groups[0] || 'Usuario'"></span>
                <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold" x-text="user.username[0].toUpperCase()"></div>
            </div>
        </header>

        <!-- Dynamic Workspace -->
        <div class="flex-1 overflow-y-auto p-8">
            
            <div x-show="activeModule === 'activos'" style="display: none;" class="mb-6">
                <nav class="flex space-x-4 border-b border-gray-200">
                    <button @click="activeTab = 'tractocamiones'; fetchData()" :class="activeTab === 'tractocamiones' ? 'border-blue-500 text-blue-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Tractocamiones</button>
                    <button @click="activeTab = 'choferes'; fetchData()" :class="activeTab === 'choferes' ? 'border-blue-500 text-blue-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Choferes</button>
                    <button @click="activeTab = 'cajas_remolques'; fetchData()" :class="activeTab === 'cajas_remolques' ? 'border-blue-500 text-blue-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Cajas/Remolques</button>
                </nav>
            </div>

            <div x-show="activeModule === 'operaciones'" style="display: none;" class="mb-6">
                 <nav class="flex space-x-4 border-b border-gray-200">
                    <button @click="activeTab = 'viajes'; fetchData()" :class="activeTab === 'viajes' ? 'border-blue-500 text-blue-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Bitácora de Viajes</button>
                 </nav>
            </div>

            <div x-show="activeModule === 'mantenimiento'" style="display: none;" class="mb-6">
                 <nav class="flex space-x-4 border-b border-gray-200">
                    <button @click="activeTab = 'ordenes_trabajo'; fetchData()" :class="activeTab === 'ordenes_trabajo' ? 'border-blue-500 text-blue-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Órdenes de Trabajo Activas</button>
                    <button @click="activeTab = 'insumos'; fetchData()" :class="activeTab === 'insumos' ? 'border-blue-500 text-blue-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Insumos y Refacciones</button>
                 </nav>
            </div>

            <div x-show="activeModule === 'finanzas'" style="display: none;" class="mb-6 flex justify-between items-center">
                 <nav class="flex space-x-4 border-b border-gray-200 flex-1">
                    <button @click="activeTab = 'gastos_operativos'; fetchData()" :class="activeTab === 'gastos_operativos' ? 'border-emerald-500 text-emerald-600 border-b-2' : 'text-gray-500 hover:text-gray-700'" class="pb-2 px-1 font-medium text-sm">Gastos Operativos (Diésel, Casetas)</button>
                 </nav>
                 <a href="/api/exportacion/gastos" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 flex items-center rounded-md font-semibold text-sm transition shadow-sm ml-4">
                     📥 Exportar Excel/CSV Maestro
                 </a>
            </div>

            <!-- Data Table Universal -->
            <div class="bg-white shadow rounded-lg border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50 rounded-t-lg">
                    <h3 class="text-lg font-medium text-gray-900 capitalize" x-text="activeTab.replace('_', ' ')"></h3>
                    <!-- Solo Admin/Operadores pueden crear registros. Clientes No. -->
                    <template x-if="!hasRole('cliente')">
                        <button @click="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 text-sm font-semibold shadow-sm transition">+ Nuevo Registro</button>
                    </template>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-white">
                            <tr>
                                <template x-for="col in columns[activeTab]" :key="col">
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider" x-text="col.replace('_', ' ')"></th>
                                </template>
                                <template x-if="!hasRole('cliente')">
                                    <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Acción</th>
                                </template>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-100">
                            <template x-for="item in data[activeTab]" :key="item.id">
                                <tr :class="(activeTab === 'ordenes_trabajo' && item.prioridad === 'alta') ? 'bg-red-50' : 'hover:bg-gray-50'">
                                    <template x-for="col in columns[activeTab]" :key="col">
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
                                            <span x-show="col === 'checklist_fallas' && item[col]" class="text-xs bg-red-100 text-red-800 px-2 py-1 rounded" x-text="item[col]"></span>
                                            <span x-show="col === 'monto' || col === 'costo_unitario'" class="text-emerald-700 font-bold" x-text="'$'+item[col]"></span>
                                            <span x-show="col !== 'checklist_fallas' && col !== 'monto' && col !== 'costo_unitario'" x-text="item[col]"></span>
                                        </td>
                                    </template>
                                    <template x-if="!hasRole('cliente')">
                                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                            <button @click="deleteRecord(item.id)" class="text-red-500 hover:text-red-700 transition">Eliminar</button>
                                        </td>
                                    </template>
                                </tr>
                            </template>
                            <tr x-show="!data[activeTab] || data[activeTab].length === 0">
                                <td :colspan="columns[activeTab]?.length + (hasRole('cliente') ? 0 : 1)" class="px-6 py-8 text-center text-sm text-gray-400">Sin datos en la tabla.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Generic Modal Universal -->
    <div x-show="showModal" style="display: none;" class="fixed inset-0 z-50 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-900 bg-opacity-60 transition-opacity" @click="showModal = false"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form @submit.prevent="submitForm">
                    <div class="bg-white px-6 pt-6 pb-6 border-b border-gray-100">
                        <h3 class="text-xl font-bold text-gray-900 mb-6 capitalize text-center">Registrar <span x-text="activeTab.replace('_', ' ')"></span></h3>
                        
                        <!-- Form Tractos -->
                        <template x-if="activeTab === 'tractocamiones'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">Económico</label><input type="text" x-model="formData.economico" required class="mt-1 w-full border-gray-300 rounded-md p-2 bg-gray-50 border"></div>
                                <div><label class="text-sm font-medium text-gray-700">Placas</label><input type="text" x-model="formData.placas" required class="mt-1 w-full border-gray-300 rounded-md p-2 bg-gray-50 border"></div>
                                <div><label class="text-sm font-medium text-gray-700">Estatus</label>
                                    <select x-model="formData.status_operativo" class="mt-1 w-full border-gray-300 rounded-md p-2 bg-gray-50 border">
                                        <option value="disponible">Disponible</option><option value="en_ruta">En Ruta</option><option value="mantenimiento">Mantenimiento</option>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <!-- Form Choferes -->
                        <template x-if="activeTab === 'choferes'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">Nombre</label><input type="text" x-model="formData.nombre" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">Licencia</label><input type="text" x-model="formData.numero_licencia" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">Estatus</label>
                                    <select x-model="formData.status" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1">
                                        <option value="activo">Activo</option><option value="en_viaje">En Viaje</option><option value="inactivo">Inactivo</option>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <!-- Form Cajas -->
                        <template x-if="activeTab === 'cajas_remolques'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">Económico (ID)</label><input type="text" x-model="formData.economico" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">Subtipo</label>
                                    <select x-model="formData.subtipo" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1">
                                        <option value="seca">Caja Seca</option><option value="refrigerada">Refrigerada</option><option value="plataforma">Plataforma</option>
                                    </select>
                                </div>
                                <div><label class="text-sm font-medium text-gray-700">Estatus Operativo</label>
                                    <select x-model="formData.status" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1">
                                        <option value="disponible">Disponible</option><option value="en_ruta">En Ruta</option><option value="mantenimiento">Mantenimiento</option>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <!-- Form Viajes -->
                        <template x-if="activeTab === 'viajes'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">ID Tractocamión</label><input type="number" x-model="formData.id_tractocamion" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">ID Chofer</label><input type="number" x-model="formData.id_chofer" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">ID Cliente</label><input type="number" x-model="formData.id_cliente" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-sm font-medium text-gray-700">Origen</label><input type="text" x-model="formData.origen" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                    <div><label class="text-sm font-medium text-gray-700">Destino</label><input type="text" x-model="formData.destino" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                </div>
                                <div><label class="text-sm font-medium text-gray-700">Estatus</label>
                                    <select x-model="formData.status" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1">
                                        <option value="creado">Creado</option><option value="en_ruta">En Ruta</option><option value="entregado">Entregado</option>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <!-- Form Evidencias (Files) -->
                        <template x-if="activeTab === 'evidencias'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">ID de Viaje Asociado</label><input type="number" x-model="formData.id_viaje" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">Archivo (PDF/XML)</label>
                                     <input type="file" @change="formData.archivo = $event.target.files[0]" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1 text-sm">
                                </div>
                            </div>
                        </template>

                        <!-- Form Ordenes Trabajo (Mantenimiento) -->
                        <template x-if="activeTab === 'ordenes_trabajo'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">ID Tractocamión</label><input type="number" x-model="formData.id_tractocamion" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div>
                                    <label class="text-sm font-medium text-gray-700">Checklist Ágil</label>
                                    <div class="grid grid-cols-2 gap-2 mt-2 bg-gray-50 p-3 rounded border">
                                        <label><input type="checkbox" x-model="mantenimientoChecklist.motor"> Motor</label><label><input type="checkbox" x-model="mantenimientoChecklist.llantas"> Llantas</label>
                                        <label><input type="checkbox" x-model="mantenimientoChecklist.frenos"> Frenos</label><label><input type="checkbox" x-model="mantenimientoChecklist.luces"> Luces</label>
                                    </div>
                                </div>
                                <div><label class="text-sm font-medium text-gray-700">Descripción Detallada</label><textarea x-model="formData.descripcion_falla" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1" rows="2"></textarea></div>
                                <div><label class="text-sm font-medium text-gray-700">Prioridad</label>
                                    <select x-model="formData.prioridad" class="w-full border-gray-300 rounded-md p-2 text-red-700 font-bold border mt-1">
                                        <option value="baja">Baja</option><option value="media">Media</option><option value="alta">Alta</option>
                                    </select>
                                </div>
                            </div>
                        </template>

                        <!-- Form Insumos (Mantenimiento) -->
                        <template x-if="activeTab === 'insumos'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">ID Tractocamión</label><input type="number" x-model="formData.id_tractocamion" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">Nombre de Insumo / Refacción</label><input type="text" x-model="formData.nombre_insumo" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1" placeholder="Ej. Llantas Michelin, Aceite Mobil"></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-sm font-medium text-gray-700">Cantidad</label><input type="number" step="0.01" x-model="formData.cantidad" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                    <div><label class="text-sm font-medium text-gray-700">Costo Unitario ($)</label><input type="number" step="0.01" x-model="formData.costo_unitario" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                </div>
                                <div><label class="text-sm font-medium text-gray-700">Fecha Consumo</label><input type="date" x-model="formData.fecha_consumo" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                            </div>
                        </template>

                        <!-- Form Finanzas (Gastos Operativos) -->
                        <template x-if="activeTab === 'gastos_operativos'">
                            <div class="space-y-4">
                                <div><label class="text-sm font-medium text-gray-700">ID Tractocamión</label><input type="number" x-model="formData.id_tractocamion" required class="mt-1 w-full border-gray-300 rounded-md p-2 bg-gray-50 border"></div>
                                <div><label class="text-sm font-medium text-gray-700">ID Viaje (Opcional)</label><input type="number" x-model="formData.id_viaje" class="mt-1 w-full border-gray-300 rounded-md p-2 bg-gray-50 border"></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-sm font-medium text-gray-700">Tipo Gasto</label>
                                        <select x-model="formData.tipo_gasto" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1">
                                            <option value="diesel">Diésel</option><option value="casetas">Casetas</option>
                                            <option value="viaticos">Viáticos</option><option value="reparacion">Reparación Taller</option>
                                            <option value="otro">Otro</option>
                                        </select>
                                    </div>
                                    <div><label class="text-sm font-medium text-gray-700">Monto ($)</label><input type="number" step="0.01" x-model="formData.monto" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                </div>
                                <div><label class="text-sm font-medium text-gray-700">Fecha de Gasto</label><input type="date" x-model="formData.fecha" required class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1"></div>
                                <div><label class="text-sm font-medium text-gray-700">Nota Auditores (Opcional)</label><textarea x-model="formData.descripcion" class="w-full border-gray-300 rounded-md p-2 bg-gray-50 border mt-1" rows="2"></textarea></div>
                            </div>
                        </template>

                    </div>
                    <div class="bg-gray-50 px-6 py-4 flex flex-row-reverse space-x-reverse space-x-3">
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 font-medium shadow-sm transition">Guardar</button>
                        <button type="button" @click="showModal = false" class="bg-white text-gray-700 px-6 py-2 rounded-md hover:bg-gray-100 font-medium border border-gray-300 transition">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('pizarronApp', () => ({
            user: null, // Identity from AuthMe
            activeModule: 'operaciones', 
            activeTab: 'viajes', 
            error: null,
            showModal: false,
            data: { tractocamiones: [], choferes: [], cajas_remolques: [], viajes: [], evidencias: [], ordenes_trabajo: [], gastos_operativos: [], insumos: [] },
            columns: {
                tractocamiones: ['id', 'economico', 'placas', 'status_operativo'],
                choferes: ['id', 'nombre', 'numero_licencia', 'status'],
                cajas_remolques: ['id', 'economico', 'subtipo', 'status'],
                viajes: ['id', 'id_chofer', 'id_tractocamion', 'origen', 'destino', 'status'],
                evidencias: ['id', 'id_viaje', 'nombre_original', 'tipo_documento'],
                ordenes_trabajo: ['id', 'prioridad', 'id_tractocamion', 'descripcion_falla', 'status'],
                insumos: ['id', 'id_tractocamion', 'nombre_insumo', 'cantidad', 'costo_unitario', 'fecha_consumo'],
                gastos_operativos: ['id', 'id_tractocamion', 'id_viaje', 'tipo_gasto', 'monto', 'fecha']
            },
            formData: {},
            mantenimientoChecklist: { motor: false, llantas: false, frenos: false, luces: false },
            
            async init() { 
                await this.fetchUser();
                // Set default module based on role
                if(this.hasRole('cliente')) { this.activeModule = 'operaciones'; this.activeTab = 'viajes'; }
                else if(this.hasRole('mantenimiento')) { this.activeModule = 'mantenimiento'; this.activeTab = 'ordenes_trabajo'; }
                else { this.activeModule = 'activos'; this.activeTab = 'tractocamiones'; }
                this.fetchData(); 
            },

            async fetchUser() {
                try {
                    const res = await fetch('/api/auth/me');
                    if(res.ok) this.user = await res.json();
                    else window.location.href = '/login';
                } catch(e) { window.location.href = '/login'; }
            },

            hasRole(role) { return this.user && this.user.groups.includes(role); },
            
            setModule(mod, tab) {
                this.activeModule = mod;
                this.activeTab = tab;
                this.fetchData();
            },

            async fetchData() {
                this.error = null;
                try {
                    let ep = (this.activeTab === 'cajas_remolques') ? 'cajas_remolques' : this.activeTab;
                    const response = await fetch('/api/' + ep, { headers: { 'Accept': 'application/json' }});
                    if (!response.ok) {
                        if(response.status === 403) throw new Error("Acceso Restringido (RBAC).");
                        throw new Error("Error obteniendo datos.");
                    }
                    this.data[this.activeTab] = await response.json();
                } catch (e) { this.error = "Error al conectar con API ("+this.activeTab+"): " + e.message; }
            },

            openModal() {
                this.formData = {};
                // Defaults settings ...
                if(this.activeTab === 'tractocamiones') this.formData.status_operativo = 'disponible';
                if(this.activeTab === 'choferes') this.formData.status = 'activo';
                if(this.activeTab === 'cajas_remolques') { this.formData.status = 'disponible'; this.formData.subtipo = 'seca'; }
                if(this.activeTab === 'viajes') this.formData.status = 'creado';
                if(this.activeTab === 'ordenes_trabajo') { 
                    this.formData.prioridad = 'alta'; 
                    this.mantenimientoChecklist = { motor: false, llantas: false, frenos: false, luces: false }; 
                }
                if(this.activeTab === 'insumos') this.formData.fecha_consumo = new Date().toISOString().split('T')[0];
                if(this.activeTab === 'gastos_operativos') {
                    this.formData.tipo_gasto = 'diesel';
                    this.formData.fecha = new Date().toISOString().split('T')[0];
                }
                this.showModal = true;
            },

            async submitForm() {
                try {
                    let ep = (this.activeTab === 'cajas_remolques') ? 'cajas_remolques' : this.activeTab;
                    
                    if(this.activeTab === 'evidencias') {
                        const formPayload = new FormData();
                        formPayload.append('id_viaje', this.formData.id_viaje);
                        formPayload.append('evidencia', this.formData.evidencia); // Matching controller field name
                        const res = await fetch('/api/' + ep, { method: 'POST', body: formPayload });
                        if(res.ok) { this.showModal=false; this.fetchData(); return; }
                        else { const e = await res.json(); alert("Error: " + JSON.stringify(e.messages)); return; }
                    }

                    if(this.activeTab === 'ordenes_trabajo') {
                        this.formData.id_usuario_reporta = this.user.id;
                        this.formData.checklist_fallas = JSON.stringify(this.mantenimientoChecklist);
                    }

                    const response = await fetch('/api/' + ep, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify(this.formData)
                    });

                    if (response.ok) {
                        this.showModal = false;
                        this.fetchData();
                    } else {
                        const data = await response.json();
                        alert("Restricción del Motor Backend: " + JSON.stringify(data.messages));
                    }
                } catch (e) { alert("Error de conexión guardando en DB."); }
            },

            async deleteRecord(id) {
                if(!confirm("¿Borrar definitivamente registro #" + id + "?")) return;
                try {
                    let ep = (this.activeTab === 'cajas_remolques') ? 'cajas_remolques' : this.activeTab;
                    const res = await fetch('/api/' + ep + '/' + id, { method: 'DELETE' });
                    if(res.ok) this.fetchData();
                    else alert("Error de persistencia o restricción Shield.");
                } catch (e) { alert("Error de I/O"); }
            }
        }));
    });
</script>
</body>
</html>
