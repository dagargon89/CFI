<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Pizarrón Digital - CFI Logístico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <header class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">CFI Logístico - Pizarrón Digital</h1>
            <nav>
                <a href="/logout" class="px-4 py-2 bg-blue-700 hover:bg-blue-600 rounded inline-block">Cerrar Sesión</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8" x-data="pizarronApp()">
        <div class="mb-6 border-b border-gray-200">
            <nav class="-mb-px flex space-x-8">
                <button @click="switchTab('tractocamiones')" :class="activeTab === 'tractocamiones' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'" class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm">Tractocamiones</button>
                <button @click="switchTab('choferes')" :class="activeTab === 'choferes' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'" class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm">Choferes</button>
                <button @click="switchTab('cajas_remolques')" :class="activeTab === 'cajas_remolques' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'" class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm">Cajas/Remolques</button>
            </nav>
        </div>

        <div x-show="error" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" x-text="error" style="display: none;"></div>
        
        <!-- Vista Dinámica de Tablas -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold capitalize" x-text="activeTab.replace('_', ' ')"></h2>
                <button @click="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">+ Añadir Registro</button>
            </div>
            
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <template x-for="col in columns[activeTab]" :key="col">
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider" x-text="col"></th>
                            </template>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="item in data[activeTab]" :key="item.id">
                            <tr>
                                <template x-for="col in columns[activeTab]" :key="col">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="item[col]"></td>
                                </template>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                    <button @click="deleteRecord(item.id)" class="text-red-600 hover:text-red-900 font-medium">Borrar</button>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="data[activeTab].length === 0">
                            <td :colspan="columns[activeTab].length + 1" class="px-6 py-4 text-center text-sm text-gray-500">Sin registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- CRUD Modal Generico -->
        <div x-show="showModal" style="display: none;" class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showModal = false"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
                <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <form @submit.prevent="submitForm">
                        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4 capitalize">Añadir <span x-text="activeTab.replace('_', ' ')"></span></h3>
                            
                            <!-- Form Tractos -->
                            <template x-if="activeTab === 'tractocamiones'">
                                <div>
                                    <input type="text" x-model="formData.economico" placeholder="Económico (Ej. TR-001)" required class="mb-3 w-full border-gray-300 rounded p-2 border">
                                    <input type="text" x-model="formData.placas" placeholder="Placas" required class="mb-3 w-full border-gray-300 rounded p-2 border">
                                    <select x-model="formData.status_operativo" class="w-full border-gray-300 rounded p-2 border">
                                        <option value="disponible">Disponible</option>
                                        <option value="en_ruta">En Ruta</option>
                                        <option value="mantenimiento">Mantenimiento</option>
                                    </select>
                                </div>
                            </template>
                            
                            <!-- Form Choferes -->
                            <template x-if="activeTab === 'choferes'">
                                <div>
                                    <input type="text" x-model="formData.nombre" placeholder="Nombre completo" required class="mb-3 w-full border-gray-300 rounded p-2 border">
                                    <input type="text" x-model="formData.numero_licencia" placeholder="Licencia" required class="mb-3 w-full border-gray-300 rounded p-2 border">
                                    <select x-model="formData.status" class="w-full border-gray-300 rounded p-2 border">
                                        <option value="activo">Activo</option>
                                        <option value="en_viaje">En Viaje</option>
                                        <option value="inactivo">Inactivo</option>
                                    </select>
                                </div>
                            </template>
                            
                            <!-- Form Cajas -->
                            <template x-if="activeTab === 'cajas_remolques'">
                                <div>
                                    <input type="text" x-model="formData.economico" placeholder="Económico (Ej. CJ-500)" required class="mb-3 w-full border-gray-300 rounded p-2 border">
                                    <select x-model="formData.subtipo" class="mb-3 w-full border-gray-300 rounded p-2 border">
                                        <option value="seca">Caja Seca</option>
                                        <option value="refrigerada">Refrigerada</option>
                                        <option value="plataforma">Plataforma</option>
                                    </select>
                                    <select x-model="formData.status" class="w-full border-gray-300 rounded p-2 border">
                                        <option value="disponible">Disponible</option>
                                        <option value="en_ruta">En Ruta</option>
                                        <option value="mantenimiento">Mantenimiento</option>
                                    </select>
                                </div>
                            </template>
                        </div>
                        <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                            <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 sm:ml-3 sm:w-auto sm:text-sm">Guardar</button>
                            <button type="button" @click="showModal = false" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('pizarronApp', () => ({
                activeTab: 'tractocamiones',
                error: null,
                showModal: false,
                data: { tractocamiones: [], choferes: [], cajas_remolques: [] },
                columns: {
                    tractocamiones: ['economico', 'placas', 'status_operativo'],
                    choferes: ['nombre', 'numero_licencia', 'status'],
                    cajas_remolques: ['economico', 'subtipo', 'status']
                },
                formData: {},
                
                init() { this.fetchData(); },
                
                switchTab(tab) {
                    this.activeTab = tab;
                    this.fetchData();
                },

                async fetchData() {
                    this.error = null;
                    try {
                        const response = await fetch('/api/' + this.activeTab, { headers: { 'Accept': 'application/json' }});
                        if (!response.ok) throw new Error("Error obteniendo datos.");
                        this.data[this.activeTab] = await response.json();
                    } catch (e) { this.error = "Error al conectar con la API."; }
                },

                openModal() {
                    this.formData = {};
                    if(this.activeTab === 'tractocamiones') this.formData.status_operativo = 'disponible';
                    if(this.activeTab === 'choferes') this.formData.status = 'activo';
                    if(this.activeTab === 'cajas_remolques') { this.formData.status = 'disponible'; this.formData.subtipo = 'seca'; }
                    this.showModal = true;
                },

                async submitForm() {
                    try {
                        const response = await fetch('/api/' + this.activeTab, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            body: JSON.stringify(this.formData)
                        });
                        if (response.ok) {
                            this.showModal = false;
                            this.fetchData();
                        } else {
                            const data = await response.json();
                            alert("Error en captura: " + JSON.stringify(data.messages));
                        }
                    } catch (e) { alert("Error de conexión"); }
                },

                async deleteRecord(id) {
                    if(!confirm("¿Borrar definitivamente?")) return;
                    try {
                        const res = await fetch('/api/' + this.activeTab + '/' + id, { method: 'DELETE' });
                        if(res.ok) this.fetchData();
                    } catch (e) { alert("Error al borrar"); }
                }
            }));
        });
    </script>
</body>
</html>
