<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento - CFI Logístico</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
    <header class="bg-red-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center">
                <svg class="w-6 h-6 mr-2 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Taller Mantenimiento
            </h1>
            <nav>
                <button class="px-4 py-2 bg-red-800 hover:bg-red-700 rounded text-sm transition">Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8" x-data="mantenimientoApp()">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Órdenes de Trabajo</h2>
                <p class="text-gray-500 mt-1">Supervisión en tiempo real de unidades averiadas</p>
            </div>
            <button @click="showModal = true" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg shadow-md flex items-center font-semibold transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Reporte Ágil (Checklist)
            </button>
        </div>

        <div x-show="error" style="display: none;" class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded">
            <p class="text-sm text-red-700" x-text="error"></p>
        </div>

        <!-- Orders Table -->
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Prioridad</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID Unidad</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Falla / Checklist</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Estatus</th>
                        <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Acción</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <template x-for="orden in ordenes" :key="orden.id">
                        <tr :class="orden.prioridad === 'alta' ? 'bg-red-50' : (orden.prioridad === 'media' ? 'bg-orange-50' : 'bg-white')">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-bold rounded-full uppercase"
                                    :class="{
                                        'bg-red-200 text-red-900': orden.prioridad === 'alta',
                                        'bg-orange-200 text-orange-900': orden.prioridad === 'media',
                                        'bg-green-100 text-green-800': orden.prioridad === 'baja'
                                    }" x-text="orden.prioridad"></span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-bold">
                                Trc# <span x-text="orden.id_tractocamion"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-700">
                                <p class="font-medium" x-text="orden.descripcion_falla || 'Reporte de Áreas'"></p>
                                <div class="mt-1 flex space-x-2" x-show="orden.checklist_fallas">
                                    <template x-for="(val, key) in JSON.parse(orden.checklist_fallas)" :key="key">
                                        <span x-show="val" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800 capitalize" x-text="key"></span>
                                    </template>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-medium capitalize" x-text="orden.status"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <button class="text-red-600 hover:text-red-900">Atender</button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="ordenes.length === 0">
                        <td colspan="5" class="px-6 py-8 text-center text-sm text-gray-500">No hay órdenes de trabajo abiertas en este momento.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Reporte Ágil -->
        <div x-show="showModal" style="display: none;" class="fixed inset-0 z-10 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showModal = false"></div>
                <!-- This element is to trick the browser into centering the modal contents. -->
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <form @submit.prevent="submitReporte">
                        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                            <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" id="modal-title">Nuevo Reporte de Falla</h3>
                            
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">ID Tractocamión</label>
                                <input type="number" x-model="form.id_tractocamion" required class="w-full border-gray-300 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500 p-2 border">
                            </div>

                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Checklist Rápido</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center space-x-2 text-sm">
                                        <input type="checkbox" x-model="form.checklist_fallas.motor" class="rounded text-red-600 focus:ring-red-500">
                                        <span>Motor</span>
                                    </label>
                                    <label class="flex items-center space-x-2 text-sm">
                                        <input type="checkbox" x-model="form.checklist_fallas.llantas" class="rounded text-red-600 focus:ring-red-500">
                                        <span>Llantas</span>
                                    </label>
                                    <label class="flex items-center space-x-2 text-sm">
                                        <input type="checkbox" x-model="form.checklist_fallas.frenos" class="rounded text-red-600 focus:ring-red-500">
                                        <span>Frenos</span>
                                    </label>
                                    <label class="flex items-center space-x-2 text-sm">
                                        <input type="checkbox" x-model="form.checklist_fallas.luces" class="rounded text-red-600 focus:ring-red-500">
                                        <span>Luces</span>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Notas / Observaciones</label>
                                <textarea x-model="form.descripcion_falla" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500 p-2 border" rows="2"></textarea>
                            </div>

                            <div class="mb-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
                                <select x-model="form.prioridad" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500 p-2 border text-red-700 font-bold">
                                    <option value="baja">Baja - Preventiva</option>
                                    <option value="media">Media - Revisión Pronta</option>
                                    <option value="alta">Alta - Inmovilizado</option>
                                </select>
                            </div>
                        </div>
                        <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                            <button type="submit" :disabled="submitting" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50">
                                Enviar Reporte
                            </button>
                            <button type="button" @click="showModal = false" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('mantenimientoApp', () => ({
                ordenes: [],
                error: null,
                showModal: false,
                submitting: false,
                form: {
                    id_tractocamion: '',
                    descripcion_falla: '',
                    prioridad: 'alta',
                    checklist_fallas: {
                        motor: false,
                        llantas: false,
                        frenos: false,
                        luces: false
                    }
                },
                
                init() {
                    this.fetchOrdenes();
                },

                async fetchOrdenes() {
                    this.error = null;
                    try {
                        const response = await fetch('/api/ordenes_trabajo', {
                            headers: { 'Accept': 'application/json' }
                        });
                        if (response.ok) {
                             this.ordenes = await response.json();
                        }
                    } catch (e) {
                        this.error = "Error al obtener las órdenes.";
                    }
                },

                async submitReporte() {
                    this.submitting = true;
                    try {
                        const payload = {
                            id_tractocamion: this.form.id_tractocamion,
                            descripcion_falla: this.form.descripcion_falla,
                            prioridad: this.form.prioridad,
                            checklist_fallas: this.form.checklist_fallas
                        };

                        const response = await fetch('/api/ordenes_trabajo', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            this.showModal = false;
                            this.fetchOrdenes(); // Refresh list
                            
                            this.form.id_tractocamion = '';
                            this.form.descripcion_falla = '';
                            this.form.prioridad = 'alta';
                            Object.keys(this.form.checklist_fallas).forEach(k => this.form.checklist_fallas[k] = false);
                        } else {
                            const data = await response.json();
                            alert("Error en captura: " + JSON.stringify(data.messages));
                        }
                    } catch (e) {
                        alert("Error de conexión");
                    }
                    this.submitting = false;
                }
            }));
        });
    </script>
</body>
</html>
