<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cliente - CFI Logístico</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#D1A14E",
                        "surface-container-lowest": "#0e0e0f",
                        "on-error": "#ffb4ab",
                        "surface-variant": "#353436",
                        "surface-container-high": "#2a2a2b",
                        "inverse-surface": "#e5e2e3",
                        "primary": "#D1A14E",
                        "on-primary-container": "#9E7632",
                        "primary-container": "#4b391a",
                        "surface-container-low": "#1b1b1c",
                        "surface": "#131314",
                        "on-secondary-fixed-variant": "#434b18",
                        "secondary-container": "#434b18",
                        "surface-container-highest": "#353436",
                        "on-surface": "#e5e2e3",
                        "on-secondary-container": "#b1bb7c",
                        "on-primary": "#2e2100",
                        "on-secondary": "#2d3404",
                        "primary-fixed": "#f8e3be",
                        "error": "#93000a",
                        "inverse-on-surface": "#303031",
                        "background": "#131314",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#3d2b1f",
                        "on-primary-fixed": "#2e2100",
                        "surface-tint": "#D1A14E",
                        "on-tertiary-container": "#ac9181",
                        "tertiary-fixed-dim": "#dec1af",
                        "surface-dim": "#131314",
                        "on-tertiary": "#3f2c20",
                        "tertiary": "#dec1af",
                        "secondary": "#D1A14E",
                        "outline-variant": "#4f453f",
                        "on-secondary-fixed": "#191e00",
                        "tertiary-fixed": "#fbddca",
                        "on-tertiary-fixed-variant": "#574335",
                        "on-background": "#e5e2e3",
                        "secondary-fixed-dim": "#D1A14E",
                        "on-surface-variant": "#d2c4bc",
                        "on-primary-fixed-variant": "#6d5200",
                        "secondary-fixed": "#f8e3be",
                        "surface-container": "#1f1f20",
                        "error-container": "#ffb4ab",
                        "surface-bright": "#39393a",
                        "outline": "#9b8e87",
                        "inverse-primary": "#906d00",
                        "on-tertiary-fixed": "#28180d"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0px", "sm": "0px", "md": "0px", "lg": "0px", "xl": "0px", "2xl": "0px", "3xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .matte-grain { position: relative; }
        .matte-grain::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased selection:bg-primary selection:text-on-primary min-h-screen relative">
    <div class="absolute inset-0 bg-surface -z-10 matte-grain pointer-events-none"></div>

    <!-- Header Executive Style -->
    <header class="bg-surface-container-low border-b border-outline-variant/20 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center relative matte-grain">
            <h1 class="text-2xl font-headline font-bold text-primary flex items-center uppercase tracking-widest">
                <span class="material-symbols-outlined text-[32px] mr-3">architecture</span>
                Portal Cliente
            </h1>
            <nav>
                <a href="/logout" class="block w-full text-center border border-error text-error hover:bg-error/10 px-6 py-2 font-label uppercase tracking-widest font-bold transition-colors text-[10px]">Cerrar Sesión</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12" x-data="portalCliente()">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <span class="font-label text-xs uppercase tracking-[0.3em] text-primary block mb-2">Visión de Operaciones</span>
                <h2 class="text-4xl md:text-5xl font-headline font-bold text-on-surface tracking-tight">Viajes Asignados</h2>
            </div>
            <button @click="fetchViajes()" class="bg-primary hover:brightness-110 text-on-primary px-8 py-3 flex items-center transition-all font-label text-[10px] uppercase font-bold tracking-widest">
                <span class="material-symbols-outlined text-[18px] mr-2">sync</span>
                Actualizar Log
            </button>
        </div>

        <div x-show="error" style="display: none;" class="bg-error/20 border-l-4 border-error p-4 mb-8 flex items-center text-error-container font-body text-sm font-medium">
            <span class="material-symbols-outlined mr-3">error</span>
            <span x-text="error"></span>
        </div>

        <!-- Trips Grid (Bento Style) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="viaje in viajes" :key="viaje.id">
                <div class="bg-surface-container-low border border-outline-variant/30 hover:border-primary/50 hover:bg-surface-container transition-colors duration-300 relative group overflow-hidden matte-grain flex flex-col">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary/20 group-hover:bg-primary transition-colors"></div>
                    
                    <div class="px-8 py-5 border-b border-outline-variant/20 flex justify-between items-center bg-surface-container-high/30">
                        <span class="font-label text-[10px] uppercase tracking-widest text-outline group-hover:text-primary transition-colors">Viaje_ID <span class="font-bold text-on-surface ml-1" x-text="'#'+viaje.id"></span></span>
                        
                        <span class="px-3 py-1 text-[10px] font-label font-bold uppercase tracking-widest border" 
                              :class="{
                                  'bg-primary/10 text-primary border-primary/20': viaje.status === 'creado',
                                  'bg-[#434b18]/20 text-[#c3cc8c] border-[#434b18]/50': viaje.status === 'en_ruta',
                                  'bg-surface-container-highest text-outline border-outline-variant/30': viaje.status === 'entregado',
                                  'bg-error/10 text-error border-error/20': viaje.status === 'cancelado'
                              }" 
                              x-text="viaje.status">
                        </span>
                    </div>
                    
                    <div class="p-8 flex-grow flex flex-col justify-between">
                        <div class="flex space-x-6 mb-8">
                            <div class="flex-1">
                                <p class="text-[10px] font-label uppercase tracking-widest text-outline mb-1">Nodo Origen</p>
                                <p class="font-body font-bold text-sm text-on-surface leading-tight" x-text="viaje.origen"></p>
                            </div>
                            <div class="w-px bg-outline-variant/20"></div>
                            <div class="flex-1 text-right">
                                <p class="text-[10px] font-label uppercase tracking-widest text-outline mb-1">Nodo Destino</p>
                                <p class="font-body font-bold text-sm text-on-surface leading-tight" x-text="viaje.destino"></p>
                            </div>
                        </div>
                        
                        <div class="border-t border-outline-variant/20 pt-5 flex items-center justify-between">
                            <span class="text-[10px] font-label uppercase tracking-widest text-outline">Sync: <span x-text="formatDate(viaje.updated_at)"></span></span>
                            <button class="text-[10px] font-label font-bold uppercase tracking-widest text-primary hover:text-white transition-colors flex items-center">
                                Telemetría <span class="material-symbols-outlined text-[14px] ml-1">arrow_forward</span>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
            
            <div x-show="viajes.length === 0 && !error" class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-16 bg-surface-container-low border border-outline-variant/20 matte-grain">
                <span class="material-symbols-outlined text-outline text-5xl mb-4 opacity-50 block">wifi_off</span>
                <h3 class="text-sm font-body font-bold text-on-surface uppercase tracking-wide">No se detectan viajes activos</h3>
                <p class="mt-2 text-xs font-body text-outline">El ledger logístico sincronizará de forma automática cuando surjan asignaciones.</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('portalCliente', () => ({
                viajes: [],
                error: null,
                
                init() {
                    this.fetchViajes();
                },

                async fetchViajes() {
                    this.error = null;
                    try {
                        const response = await fetch('/api/viajes', {
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        if (!response.ok) {
                            if(response.status === 401 || response.status === 403) {
                                this.error = "Auth Token expirado o rechazado. Inicie sesión nuevamente.";
                            } else {
                                throw new Error(`Gateway Error! code: ${response.status}`);
                            }
                        } else {
                             this.viajes = await response.json();
                        }
                    } catch (e) {
                        this.error = "Fallo de enlace de datos: " + e.message;
                    }
                },
                
                formatDate(dateStr) {
                    if(!dateStr) return '';
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('es-ES', { 
                        year: 'numeric', month: '2-digit', day: '2-digit', 
                        hour: '2-digit', minute: '2-digit' 
                    });
                }
            }));
        });
    </script>
</body>
</html>
